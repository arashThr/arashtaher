<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('/fonts/SpaceGrotesk-Regular.ttf') format('opentype');
  }

  :root {
    --color-bg:             #0D1B2A;
    --color-bg-light:       #122338;
    --color-bg-card:        #0f2035;
    --color-gold:           #C9A84C;
    --color-gold-muted:     #A8873A;
    --color-gold-faint:     rgba(201, 168, 76, 0.08);
    --color-gold-border:    rgba(201, 168, 76, 0.20);
    --color-white:          #FFFFFF;
    --color-text-primary:   rgba(255, 255, 255, 0.92);
    --color-text-secondary: rgba(255, 255, 255, 0.55);
    --color-text-muted:     rgba(255, 255, 255, 0.28);

    --font-serif: Georgia, 'Times New Roman', serif;
    --font-mono:  'IBM Plex Mono', 'Courier New', monospace;

    --text-xs:   0.70rem;
    --text-sm:   0.85rem;
    --text-base: 1.00rem;
    --text-lg:   1.25rem;
    --text-xl:   1.75rem;
    --text-2xl:  2.50rem;
    --text-3xl:  3.50rem;

    --space-xs:  0.5rem;
    --space-sm:  1.0rem;
    --space-md:  1.5rem;
    --space-lg:  2.5rem;
    --space-xl:  4.0rem;
    --space-2xl: 7.0rem;

    --max-width:       740px;
    --max-width-wide:  1100px;
    --border-radius:   4px;
    --border-gold:     1px solid var(--color-gold-border);
    --accent-bar:      4px solid var(--color-gold);
  }

  *, *::before, *::after { box-sizing: border-box; }

  body {
    background: var(--color-bg);
    color: var(--color-text-primary);
    font-family: var(--font-serif);
    font-size: var(--text-base);
    line-height: 1.75;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    background: var(--color-bg-light);
    border-bottom: var(--border-gold);
    padding: 0 var(--space-lg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .title {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--color-gold);
    text-decoration: none;
  }

  header .title h2 {
    margin: 0;
    font-size: inherit;
    font-weight: 500;
    color: inherit;
  }

  header nav {
    display: flex;
    gap: var(--space-lg);
    align-items: center;
  }

  header nav a {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    text-decoration: none;
    transition: color 0.2s;
    padding-bottom: 2px;
    border-bottom: 1px solid transparent;
  }

  header nav a:hover {
    color: var(--color-gold);
    border-bottom-color: var(--color-gold);
    text-decoration: none;
  }

  .menu-toggle {
    display: none;
    background: none;
    border: 1px solid var(--color-gold-border);
    color: var(--color-gold);
    padding: 6px 12px;
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: var(--border-radius);
    transition: all 0.2s;
  }

  .menu-toggle:hover {
    background: var(--color-gold-faint);
    border-color: var(--color-gold);
  }

  /* ── MAIN ────────────────────────────────────── */
  main { flex: 1; }

  /* ── HOMEPAGE: HERO ──────────────────────────── */
  .hero-wrapper {
    max-width: var(--max-width-wide);
    margin: 0 auto;
    padding: var(--space-2xl) var(--space-lg) var(--space-xl);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-lg);
    position: relative;
    overflow: hidden;
  }

  .geo-bg::after {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 420px;
    height: 420px;
    background-image: url('/assets/persian-star.svg');
    background-size: contain;
    background-repeat: no-repeat;
    opacity: 0.08;
    pointer-events: none;
  }

  .hero-section { flex: 1; }

  .hero-title {
    font-family: var(--font-serif);
    font-size: var(--text-3xl);
    font-weight: normal;
    margin: 0 0 var(--space-sm);
    color: var(--color-white);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .hero-subtitle {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-gold);
    margin: 0 0 var(--space-lg);
  }

  .hero-description { display: none; }

  .hero-links { display: flex; gap: var(--space-sm); }

  .cta-button {
    display: inline-block;
    padding: 10px 24px;
    border: 1px solid var(--color-gold-border);
    background: var(--color-gold-faint);
    color: var(--color-gold);
    text-decoration: none;
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border-radius: var(--border-radius);
    transition: all 0.2s;
  }

  .cta-button:hover {
    background: var(--color-gold);
    color: var(--color-bg);
    text-decoration: none;
  }

  .hero-photo-cell { flex-shrink: 0; }

  .hero-photo {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    border: 2px solid var(--color-gold-border);
    display: block;
    filter: grayscale(20%);
  }

  /* ── HOMEPAGE: CONTENT AREA ──────────────────── */
  .homepage-content {
    max-width: var(--max-width-wide);
    margin: 0 auto;
    padding: 0 var(--space-lg) var(--space-2xl);
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-xl);
  }

  /* ── SECTIONS ────────────────────────────────── */
  section {
    margin: 0;
    padding: var(--space-lg) 0;
    border-top: var(--border-gold);
  }

  .homepage-content > .two-col { border-top: var(--border-gold); }

  .two-col section { border-top: none; padding-top: 0; }

  .two-col { padding-top: var(--space-lg); }

  section h2 {
    font-family: var(--font-serif);
    font-size: var(--text-xl);
    font-weight: normal;
    color: var(--color-white);
    margin: 0 0 var(--space-md);
    padding-left: var(--space-md);
    border-left: var(--accent-bar);
    line-height: 1.2;
  }

  section h3 {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--color-gold);
    margin: var(--space-md) 0 var(--space-sm);
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  section p {
    color: var(--color-text-secondary);
    margin-bottom: var(--space-sm);
  }

  section a {
    color: var(--color-gold);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  section a:hover {
    border-bottom-color: var(--color-gold);
    text-decoration: none;
  }

  /* ── POST / ITEM CARDS ───────────────────────── */
  .boxed-ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: var(--space-xs);
  }

  .boxed-ul li {
    border-left: var(--accent-bar);
    padding: var(--space-sm) var(--space-md);
    background: var(--color-bg-card);
    border-top: var(--border-gold);
    border-right: var(--border-gold);
    border-bottom: var(--border-gold);
    border-radius: 0 var(--border-radius) var(--border-radius) 0;
    transition: background 0.2s;
  }

  .boxed-ul li:hover { background: var(--color-bg-light); }

  .boxed-ul li a {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-sm);
    color: var(--color-text-primary);
    text-decoration: none;
    border-bottom: none;
    font-family: var(--font-serif);
    font-size: var(--text-sm);
  }

  .boxed-ul li a:hover {
    color: var(--color-gold);
    border-bottom: none;
    text-decoration: none;
  }

  .boxed-ul li a .post-date {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    white-space: nowrap;
    letter-spacing: 0.1em;
  }

  /* Neutralise old Mondrian per-item colour classes */
  .boxed-ul li.red-li,
  .boxed-ul li.yellow-li,
  .boxed-ul li.black-li,
  .boxed-ul li.blue-li { border-left: var(--accent-bar); }

  .blog-section .view-all-link {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--color-gold-muted);
    display: inline-block;
    margin-top: var(--space-sm);
    text-decoration: none;
    border-bottom: none;
  }

  .blog-section .view-all-link:hover {
    color: var(--color-gold);
    border-bottom: none;
  }

  /* ── REACH OUT ───────────────────────────────── */
  .reach-out-section ul.spaced-ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: var(--space-xs);
  }

  .reach-out-section ul.spaced-ul li {
    color: var(--color-text-secondary);
    padding-left: var(--space-md);
    position: relative;
  }

  .reach-out-section ul.spaced-ul li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--color-gold-muted);
    font-family: var(--font-mono);
  }

  .reach-out-section b {
    color: var(--color-text-primary);
    font-weight: normal;
  }

  .reach-out-section > div {
    color: var(--color-text-secondary);
    margin-bottom: var(--space-sm);
  }

  /* ── CONTACT ─────────────────────────────────── */
  .contact-section { text-align: center; }

  .contact-section h2 {
    border-left: none;
    padding-left: 0;
    display: inline-block;
  }

  .contact-section p {
    max-width: 480px;
    margin: 0 auto var(--space-md);
  }

  .newsletter-container {
    background: var(--color-bg-card);
    border: var(--border-gold);
    max-width: 480px;
    margin: var(--space-md) auto 0;
    border-radius: var(--border-radius);
    overflow: hidden;
  }

  .newsletter-container #sib-container { background: transparent !important; }

  .newsletter-container input {
    border: 1px solid var(--color-gold-border) !important;
    background: var(--color-bg) !important;
    color: var(--color-text-primary) !important;
    padding: 10px !important;
    font-family: var(--font-mono) !important;
    border-radius: var(--border-radius) !important;
  }

  .newsletter-container button {
    background: var(--color-gold) !important;
    color: var(--color-bg) !important;
    border: none !important;
    padding: 10px 24px !important;
    font-family: var(--font-mono) !important;
    font-size: var(--text-xs) !important;
    letter-spacing: 0.15em !important;
    text-transform: uppercase !important;
    font-weight: 500 !important;
    cursor: pointer !important;
    border-radius: var(--border-radius) !important;
  }

  .newsletter-container button:hover { background: var(--color-gold-muted) !important; }

  .newsletter-container .entry__label {
    color: var(--color-gold) !important;
    font-family: var(--font-mono) !important;
    font-size: var(--text-xs) !important;
    letter-spacing: 0.15em !important;
    text-transform: uppercase !important;
  }

  /* ── SINGLE PAGE ─────────────────────────────── */
  main.single-page {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: var(--space-xl) var(--space-lg);
    display: block;
    background: none;
    border: none;
    min-height: 70vh;
  }

  main.single-page h1 {
    font-family: var(--font-serif);
    font-size: var(--text-2xl);
    font-weight: normal;
    color: var(--color-white);
    margin: 0 0 var(--space-sm);
    padding-left: var(--space-md);
    border-left: var(--accent-bar);
    line-height: 1.2;
  }

  main.single-page time {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-gold);
    letter-spacing: 0.15em;
    font-style: normal;
  }

  main.single-page p i {
    font-style: normal;
  }

  main.single-page content { display: block; margin-top: var(--space-lg); }

  main.single-page h2 {
    font-family: var(--font-serif);
    font-size: var(--text-xl);
    font-weight: normal;
    color: var(--color-white);
    margin: var(--space-lg) 0 var(--space-sm);
    padding-left: var(--space-md);
    border-left: 2px solid var(--color-gold-border);
  }

  main.single-page h3 {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--color-gold);
    margin: var(--space-md) 0 var(--space-sm);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  main.single-page p { color: var(--color-text-secondary); margin-bottom: var(--space-sm); }

  main.single-page a {
    color: var(--color-gold);
    text-decoration: none;
    border-bottom: 1px solid var(--color-gold-border);
    transition: border-color 0.2s;
  }

  main.single-page a:hover { border-bottom-color: var(--color-gold); text-decoration: none; }

  main.single-page blockquote {
    border-left: var(--accent-bar);
    background: var(--color-gold-faint);
    margin: var(--space-md) 0;
    padding: var(--space-sm) var(--space-md);
    font-style: italic;
    color: var(--color-text-secondary);
    border-radius: 0 var(--border-radius) var(--border-radius) 0;
  }

  main.single-page code:not(.hljs) {
    background: var(--color-bg-card);
    color: var(--color-gold);
    padding: 2px 6px;
    font-family: var(--font-mono);
    font-size: 0.9em;
    border: var(--border-gold);
    border-radius: 2px;
  }

  main.single-page pre {
    border: var(--border-gold);
    background: var(--color-bg-card);
    border-radius: var(--border-radius);
    overflow-x: auto;
    padding: 0;
    margin: var(--space-sm) 0;
  }

  main.single-page ul,
  main.single-page ol {
    padding-left: var(--space-md);
    color: var(--color-text-secondary);
  }

  main.single-page li { margin-bottom: var(--space-xs); }

  main.single-page strong,
  main.single-page b { color: var(--color-text-primary); font-weight: 600; }

  main.single-page p a[href*="/tags/"] {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: var(--border-gold);
    padding: 2px 8px;
    border-radius: 2px;
    color: var(--color-gold-muted);
  }

  main.single-page p a[href*="/tags/"]:hover {
    background: var(--color-gold-faint);
    color: var(--color-gold);
  }

  /* ── LIST PAGE ───────────────────────────────── */
  ul.blog-posts {
    list-style: none;
    padding: 0;
    margin: var(--space-md) 0;
  }

  ul.blog-posts li {
    display: flex;
    gap: var(--space-md);
    align-items: baseline;
    padding: var(--space-xs) 0;
    border-bottom: 1px solid var(--color-gold-faint);
  }

  ul.blog-posts li span { flex-shrink: 0; }

  ul.blog-posts li time {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    letter-spacing: 0.1em;
    white-space: nowrap;
    font-style: normal;
  }

  ul.blog-posts li a {
    color: var(--color-text-secondary);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.2s;
    font-family: var(--font-serif);
  }

  ul.blog-posts li a:hover { color: var(--color-gold); border-bottom: none; }
  ul.blog-posts li a:visited { color: var(--color-text-muted); }

  .list-description { color: var(--color-text-secondary); margin-bottom: var(--space-lg); }

  /* ── FOOTER ──────────────────────────────────── */
  footer {
    background: var(--color-bg-light);
    border-top: var(--border-gold);
    padding: var(--space-lg);
    text-align: center;
  }

  .social-links {
    display: flex;
    justify-content: center;
    gap: var(--space-lg);
    flex-wrap: wrap;
  }

  .social-links a {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .social-links a:hover { color: var(--color-gold); }

  /* ── MISC ────────────────────────────────────── */
  img { max-width: 100%; }

  hr {
    border: none;
    border-top: var(--border-gold);
    margin: var(--space-lg) 0;
  }

  time {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    letter-spacing: 0.1em;
    font-style: normal;
  }

  strong, b { color: var(--color-text-primary); }

  table { width: 100%; border-collapse: collapse; color: var(--color-text-secondary); }

  table th {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--color-gold);
    border-bottom: var(--border-gold);
    padding: var(--space-xs) var(--space-sm);
    text-align: left;
  }

  table td {
    padding: var(--space-xs) var(--space-sm);
    border-bottom: 1px solid var(--color-gold-faint);
  }

  /* ── RESPONSIVE ──────────────────────────────── */
  @media (max-width: 900px) {
    .two-col { grid-template-columns: 1fr; gap: var(--space-lg); }
    .hero-wrapper { padding: var(--space-xl) var(--space-md) var(--space-lg); }
    .homepage-content { padding: 0 var(--space-md) var(--space-xl); }
  }

  @media (max-width: 768px) {
    .menu-toggle { display: block; }

    header {
      padding: 0 var(--space-md);
      position: relative;
    }

    header nav {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--color-bg-light);
      border-bottom: var(--border-gold);
      flex-direction: column;
      gap: 0;
      z-index: 1000;
      padding: var(--space-sm) 0;
    }

    header nav.show { display: flex; }

    header nav a {
      padding: var(--space-sm) var(--space-lg);
      border-bottom: 1px solid var(--color-gold-faint);
      text-align: center;
      border-bottom-color: var(--color-gold-faint);
    }

    .hero-wrapper {
      flex-direction: column-reverse;
      align-items: flex-start;
      padding: var(--space-lg) var(--space-md);
    }

    .hero-title { font-size: var(--text-2xl); }

    .hero-photo { width: 72px; height: 72px; }

    .geo-bg::after { display: none; }

    main.single-page { padding: var(--space-lg) var(--space-md); }

    ul.blog-posts li { flex-direction: column; gap: 2px; }
  }
</style>
