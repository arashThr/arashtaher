<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap');

  /* Base variables */
  :root {
    --bg-color: #fcfcfc;
    --text-color: #222222;
    --link-color: #0056b3;
    --link-hover-color: #003d82;
    --meta-color: #666666;
    --font-family: "Source Serif 4", ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --max-width: 650px;
    --bg-color-muted: rgba(0, 0, 0, 0.05);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --link-color: #66b3ff;
      --link-hover-color: #99ccff;
      --meta-color: #999999;
      --bg-color-muted: rgba(255, 255, 255, 0.1);
    }
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-family);
    background-color: var(--bg-color);
    color: var(--text-color);
    line-height: 1.6;
    margin: 0;
    padding: 2rem 1.2rem;
    font-size: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  header,
  main,
  footer {
    width: 100%;
    max-width: var(--max-width);
  }

  /* Header */
  header {
    margin-bottom: 2.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--meta-color);
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
  }

  header>a {
    text-decoration: none;
    color: var(--text-color);
  }

  header h2 {
    margin: 0;
    font-size: 1.5rem;
    line-height: 1.1;
  }

  header button {
    display: none;
  }

  /* Nav */
  nav {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    width: 100%;
    justify-content: space-between;
    gap: 1rem;
  }

  nav a {
    text-decoration: none;
    color: var(--link-color);
  }

  /* Typography optimizations */
  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    line-height: 1.3;
    margin-top: 2rem;
    margin-bottom: 1rem;
    text-wrap: balance;
    color: var(--text-color);
  }

  p,
  blockquote,
  li {
    text-wrap: pretty;
    margin-bottom: 1rem;
  }

  /* Links */
  a {
    color: var(--link-color);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 2px;
  }

  a:hover {
    color: var(--link-hover-color);
  }

  /* Images */
  img {
    max-width: 100%;
    height: auto;
    border-radius: 6px;
    margin: 1rem 0;
  }

  /* Lists */
  ul {
    padding-left: 1.5rem;
  }

  li {
    margin-bottom: 0.5rem;
  }

  /* Hero Section */
  main>div:first-child h1 {
    font-size: 2.5rem;
    margin-bottom: 0.25rem;
  }

  main>div:first-child p:first-of-type {
    font-size: 1.25rem;
    color: var(--meta-color);
    margin-top: 0;
  }

  main>div:first-child p:nth-of-type(2) {
    font-size: 1.1rem;
    margin-top: 1rem;
  }

  /* Sections */
  section {
    margin-bottom: 3.5rem;
  }

  /* Footer */
  footer {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--meta-color);
    text-align: center;
    font-size: 0.9rem;
  }

  footer>div {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  /* Code Styles */
  code,
  pre {
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 0.85em;
    color: var(--text-color);
    background-color: var(--bg-color-muted);
  }

  code {
    padding: 0.2em 0.4em;
    border-radius: 3px;
  }

  pre {
    padding: 1rem;
    border-radius: 6px;
    overflow-x: auto;
  }

  pre code {
    background-color: transparent;
    padding: 0;
    font-size: 1em;
    /* inherits 0.85em from pre */
  }

  /* Details/Accordion */
  details summary {
    cursor: pointer;
    margin-bottom: 1rem;
  }

  /* Responsive adjustments */
  @media (max-width: 600px) {
    body {
      padding: 1.5rem 1rem;
      font-size: 16px;
    }

    main>div:first-child h1 {
      font-size: 2rem;
    }

    header {
      flex-direction: column;
      align-items: flex-start;
      gap: 0.5rem;
    }
  }
</style>
